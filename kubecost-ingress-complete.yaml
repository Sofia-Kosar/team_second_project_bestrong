# IngressRoute: маршрутизує https://kubecost.bestrongteam2.duckdns.org -> KubeCost
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kubecost-secure
  namespace: kubecost
  labels:
    app: kubecost
    component: ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kubecost.bestrongteam2.duckdns.org`) && PathPrefix(`/`)
      kind: Rule
      priority: 50  # Вищий пріоритет ніж API (priority: 10)
      middlewares:
        - name: basic-auth           # Basic Authentication (з kubecost-basic-auth.yaml)
          namespace: kubecost
      services:
        - name: kubecost-cost-analyzer
          port: 9090
          namespace: kubecost
  tls:
    secretName: bestrong-prod-tls   # Використовує існуючий Let's Encrypt сертифікат
