# ================================================
# Fluentd DaemonSet для збору логів BeStrong API
# ================================================
# Що робить:
#   1. Запускається на кожній Kubernetes node
#   2. Збирає логи з /var/log/containers/
#   3. Парсить JSON формат .NET Core logs
#   4. Відправляє в Loki
#
# Застосування:
#   kubectl apply -f fluentd-config.yaml
# ================================================

---
# RBAC: ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluentd
  namespace: monitoring
  labels:
    app: fluentd

---
# RBAC: ClusterRole (дозволяє читати Pod/Node metadata)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluentd
  labels:
    app: fluentd
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
    verbs:
      - get
      - list
      - watch

---
# RBAC: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluentd
  labels:
    app: fluentd
roleRef:
  kind: ClusterRole
  name: fluentd
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: fluentd
    namespace: monitoring

---
# ConfigMap: Fluentd конфігурація
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: monitoring
  labels:
    app: fluentd
data:
  fluent.conf: |
    # INPUT: Читаємо логи з Kubernetes containers
    <source>
      @type tail
      @id in_tail_container_logs
      path /var/log/containers/*bestrong*.log
      pos_file /var/log/fluentd-pos/bestrong.pos
      tag bestrong.*
      read_from_head false
      <parse>
        @type regexp
        expression /^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<flags>[^ ]*) (?<log>.*)$/
        time_key time
        time_format %Y-%m-%dT%H:%M:%S.%NZ
        keep_time_key false
      </parse>
    </source>

    # FILTER: Додаємо інформацію з імені файлу
    <filter bestrong.**>
      @type record_transformer
      <record>
        filename ${tag_suffix[2]}
        app bestrong-api
        job fluentd-bestrong
      </record>
    </filter>

    # OUTPUT: Відправляємо в Loki
    <match bestrong.**>
      @type loki
      url "http://loki-gateway.monitoring.svc.cluster.local"
      extra_labels {"job":"bestrong-api","app":"bestrong-api"}
      <buffer>
        @type memory
        flush_interval 5s
        total_limit_size 128m
        overflow_action drop_oldest_chunk
      </buffer>
    </match>

---
# DaemonSet: Fluentd на кожній node
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespace: monitoring
  labels:
    app: fluentd
    component: log-collector
spec:
  selector:
    matchLabels:
      app: fluentd
  template:
    metadata:
      labels:
        app: fluentd
        component: log-collector
    spec:
      serviceAccountName: fluentd
      securityContext:
        runAsUser: 0
        runAsGroup: 0

      # Tolerations щоб запускатись на всіх nodes (включаючи master)
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - operator: "Exists"
          effect: "NoExecute"
        - operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: fluentd
          # Офіційний образ з плагіном для Loki та Kubernetes
          image: grafana/fluent-plugin-loki:main
          imagePullPolicy: IfNotPresent

          env:
            - name: FLUENT_CONF
              value: fluent.conf
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 500Mi

          # Монтуємо логи та config
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: fluentd-config
              mountPath: /fluentd/etc/fluent.conf
              subPath: fluent.conf
            - name: fluentd-pos
              mountPath: /var/log/fluentd-pos

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - ps aux | grep fluentd | grep -v grep
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

      terminationGracePeriodSeconds: 30

      volumes:
        # Логи на host node
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        # Наш config
        - name: fluentd-config
          configMap:
            name: fluentd-config
        # Position file (щоб не читати логи з початку після restart)
        - name: fluentd-pos
          emptyDir: {}

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
