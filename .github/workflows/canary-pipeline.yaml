name: Canary Deployment with Terraform

on:
  push:
    branches: [ main, opt/fix, ops/certificate ]
  workflow_dispatch:

env:
  TF_WORKING_DIR: './terraform'
  ACR_NAME: acrbestrongstu
  AKS_CLUSTER: aks-bestrong-demo
  RESOURCE_GROUP: rg-bestrong-demo
  IMAGE_NAME: bestrong-api
  CHART_NAME: bestrong-api
  APP_VERSION: "1.0"

jobs:
  # === Terraform ===
  infrastructure:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v3

      - name: Sanitize ARM secrets
        run: |
          echo "ARM_CLIENT_ID=$(echo '${{ secrets.ARM_CLIENT_ID }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$(echo '${{ secrets.ARM_CLIENT_SECRET }}' | tr -d '\n\r')" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$(echo '${{ secrets.ARM_SUBSCRIPTION_ID }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(echo '${{ secrets.ARM_TENANT_ID }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "ARM_ACCESS_KEY=${{ secrets.ARM_ACCESS_KEY }}" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false
      - run: terraform init -backend-config="access_key=${{ secrets.ARM_ACCESS_KEY }}"
      - run: terraform validate
      - run: terraform plan -out=tfplan
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  # === Build Docker & Helm ===
  build:
    needs: infrastructure 
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.calc_version.outputs.DOCKER_TAG }}
    steps:
    - uses: actions/checkout@v3
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    

    - name: Calculate Version
      id: calc_version
      run: |
        VERSION="${{ env.APP_VERSION }}.${{ github.run_number }}"
        echo "DOCKER_TAG=$VERSION" >> $GITHUB_OUTPUT

    - name: Build and Push Docker
      run: |
        VERSION="${{ steps.calc_version.outputs.DOCKER_TAG }}"
        az acr build --image ${{ env.IMAGE_NAME }}:$VERSION \
          --registry ${{ env.ACR_NAME }} \
          --file Dockerfile .

    - name: Package and Push Helm Chart
      run: |
        VERSION="${{ steps.calc_version.outputs.DOCKER_TAG }}"
        ACR_URL="${{ env.ACR_NAME }}.azurecr.io"
        az acr login --name ${{ env.ACR_NAME }}
        helm package ./charts/${{ env.CHART_NAME }} --version $VERSION --app-version $VERSION
        helm push ${{ env.CHART_NAME }}-$VERSION.tgz oci://$ACR_URL/helm

  # === Deploy Canary ====
  deploy-canary:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3 
    - uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ env.RESOURCE_GROUP }}
        cluster-name: ${{ env.AKS_CLUSTER }}
    

    - name: Deploy Canary from ACR
      run: |
        VERSION="${{ needs.build.outputs.docker_tag }}"
        ACR_URL="${{ env.ACR_NAME }}.azurecr.io"
        az acr login --name ${{ env.ACR_NAME }}
        
        helm upgrade --install bestrong-canary oci://$ACR_URL/helm/${{ env.CHART_NAME }} \
          --version $VERSION \
          --set fullnameOverride=bestrong-api-canary \
          --set image.repository=$ACR_URL/${{ env.IMAGE_NAME }} \
          --set image.tag=$VERSION \
          --set canary.enabled=true \
          --set postgresql.enabled=true \
          --set canary.weight=20 \
          --set env.connectionString="${{ secrets.DB_CONNECTION_STRING }}" \
          --set env.aspnetEnvironment="Production" \
          --namespace default

  # === Promote to Stable ===
  promote-stable:
    needs: [deploy-canary, build]
    runs-on: ubuntu-latest
    steps:
    - uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ env.RESOURCE_GROUP }}
        cluster-name: ${{ env.AKS_CLUSTER }}
    
    

    - name: Deploy Stable with Weighted Routing
      run: |
        VERSION="${{ needs.build.outputs.docker_tag }}"
        ACR_URL="${{ env.ACR_NAME }}.azurecr.io"
        az acr login --name ${{ env.ACR_NAME }}

        helm upgrade --install bestrong-prod oci://$ACR_URL/helm/${{ env.CHART_NAME }} \
          --version $VERSION \
          --set fullnameOverride=bestrong-api-prod \
          --set image.repository=$ACR_URL/${{ env.IMAGE_NAME }} \
          --set image.tag=$VERSION \
          --set canary.enabled=false \
          --set canary.weight=20 \
          --set postgresql.enabled=true \
          --set env.connectionString="${{ secrets.DB_CONNECTION_STRING }}" \
          --set env.aspnetEnvironment="Production" \
          --namespace default

  # === Complete Rollout ===
  complete-rollout:
    needs: [promote-stable, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
    - uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ env.RESOURCE_GROUP }}
        cluster-name: ${{ env.AKS_CLUSTER }}
    

    - name: Full Rollout - 100% Traffic to Stable
      run: |
        VERSION="${{ needs.build.outputs.docker_tag }}"
        ACR_URL="${{ env.ACR_NAME }}.azurecr.io"
        az acr login --name ${{ env.ACR_NAME }}

        helm upgrade --install bestrong-prod oci://$ACR_URL/helm/${{ env.CHART_NAME }} \
          --version $VERSION \
          --set fullnameOverride=bestrong-api-prod
          --set image.repository=$ACR_URL/${{ env.IMAGE_NAME }} \
          --set image.tag=$VERSION \
          --set canary.enabled=false \
          --set canary.weight=0 \
          --set env.connectionString="${{ secrets.DB_CONNECTION_STRING }}" \
          --set env.aspnetEnvironment="Production" \
          --namespace default
