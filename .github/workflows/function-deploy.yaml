name: Deploy OCR Azure Function

on:
  push:
    branches: [ main, develop ]
    paths: [ 'function_app/**' ]
  pull_request:
    branches: [ main, develop ]
    paths: [ 'function_app/**' ]
  workflow_dispatch:

env:
  FUNCTION_APP_DEV:  func-ocr-bestrong-dev
  FUNCTION_APP_PROD: func-ocr-bestrong-prod
  PYTHON_VERSION:    '3.11'

jobs:
  # ── Run tests on every push / PR ────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: function_app/coverage.xml
          retention-days: 7

  # ── Deploy to DEV (on push to develop) ──────────────────────────────────────
  deploy-dev:
    name: Deploy to DEV
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to DEV Function App
        uses: Azure/functions-action@v1
        with:
          app-name:    ${{ env.FUNCTION_APP_DEV }}
          package:     function_app
          scm-do-build-during-deployment: true

  # ── Promote to PROD (on push to main, requires manual approval) ──────────────
  deploy-prod:
    name: Deploy to PROD
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install dependencies to package
        run: pip install -r function_app/requirements.txt --target function_app/.python_packages/lib/site-packages

      - name: Deploy to PROD Function App
        uses: Azure/functions-action@v1
        with:
          app-name:    ${{ env.FUNCTION_APP_PROD }}
          package:     function_app
          scm-do-build-during-deployment: true
