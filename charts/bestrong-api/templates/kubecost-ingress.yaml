---
# StripPrefix middleware для KubeCost
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kubecost-stripprefix
  namespace: kubecost
  labels:
    app: kubecost
spec:
  stripPrefix:
    prefixes:
      - /kubecost
    forceSlash: false

---
# IngressRoute: https://bestrongteam2.duckdns.org/kubecost -> KubeCost
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kubecost-secure
  namespace: kubecost
  labels:
    app: kubecost
    component: ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`bestrongteam2.duckdns.org`) && PathPrefix(`/kubecost`)
      kind: Rule
      priority: 50
      middlewares:
        - name: basic-auth
          namespace: kubecost
        - name: kubecost-stripprefix
          namespace: kubecost
      services:
        - name: kubecost-cost-analyzer
          port: 9090
          namespace: kubecost
  tls:
    secretName: bestrong-prod-tls
