apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      # it has to be the same as selector in service.yaml
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        # also we have this for logs monitoring
        version: {{ if .Values.canary.enabled }}canary{{ else }}stable{{ end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          env:
            - name: DB_CONNECTION_STRING
              # canary and stable have the same database
              value: "Host={{ if .Values.canary.enabled }}bestrong-prod-postgresql{{ else }}{{ .Release.Name }}-postgresql{{ end }};Port=5432;Database={{ .Values.postgresql.auth.database }};Username={{ .Values.postgresql.auth.username }};Password={{ .Values.postgresql.auth.password }};"
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.env.ASPNETCORE_ENVIRONMENT | default "Production" | quote }}
            # for logs difference
            - name: APP_VERSION
              value: "{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
          # adding probes so traefik dont send trafic to broken pods
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health  
              port: http
            initialDelaySeconds: 10  
            periodSeconds: 5         
            successThreshold: 1      
            failureThreshold: 3