{{- if .Values.ingress.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-ingressroute
  labels:
    app: {{ .Release.Name }}
spec:
  entryPoints:
    - websecure
  routes:
{{- if .Values.canary.enabled }}
    # canary release
    # using this domain for testing
    - match: Host(`{{ .Values.canary.host | default (printf "canary-%s" .Values.ingress.host) }}`)
      kind: Rule
      priority: 50
      services:
        - name: {{ .Release.Name }}   # it points on bestrong canary
          port: {{ .Values.service.port }}

{{- else }}
    # prod release
    # a main domen with weighted traffic
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      priority: 10
      
      {{- if gt (.Values.canary.weight | int) 0 }}
      # if weight > 0, using traffic weighting (20/80)
      services:
        - name: bestrong-weighted  
          kind: TraefikService
      {{- else }}
      # if weight = 0 we going on prod
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
      {{- end }}
{{- end }}
  tls:
    secretName: {{ .Release.Name }}-tls
{{- end }}